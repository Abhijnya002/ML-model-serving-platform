version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  inference-server:
    build: .
    ports:
      - "50051:50051"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GRPC_PORT=50051
      - MAX_WORKERS=10
      - DEFAULT_MODELS=iris_classifier
      - CACHE_TTL_SECONDS=3600
    volumes:
      - model-store:/app/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  model-store:
