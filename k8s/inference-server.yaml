apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-server
  namespace: ml-serving
  labels:
    app: inference-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inference-server
  template:
    metadata:
      labels:
        app: inference-server
    spec:
      containers:
        - name: inference-server
          image: ml-serving/inference-server:latest
          ports:
            - containerPort: 50051
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: GRPC_PORT
              value: "50051"
            - name: MAX_WORKERS
              value: "10"
            - name: DEFAULT_MODELS
              value: "iris_classifier"
            - name: CACHE_TTL_SECONDS
              value: "3600"
            - name: MODEL_DIR
              value: "/app/models"
          volumeMounts:
            - name: model-store
              mountPath: /app/models
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command: ["python", "-c", "import grpc; grpc.insecure_channel('localhost:50051')"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: model-store-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: inference-server
  namespace: ml-serving
spec:
  selector:
    app: inference-server
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-server-hpa
  namespace: ml-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-store-pvc
  namespace: ml-serving
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
